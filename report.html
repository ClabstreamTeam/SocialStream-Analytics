<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SocialStream Executive Report</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="assets/css/shared.css">
  <link rel="stylesheet" href="assets/css/report.css">
</head>
<body>
  <div class="report-wrap" id="reportRoot">
    <header class="report-header">
      <img src="assets/branding/socialstream-logo.png" alt="SocialStream" class="report-logo" onerror="this.style.display='none'">
      <div>
        <h1>Executive Analytics Report</h1>
        <p id="reportGeneratedAt"></p>
      </div>
      <div class="report-actions print-hidden">
        <button onclick="window.print()" class="btn btn-primary"><i class="fa-solid fa-print"></i> Print / Save PDF</button>
      </div>
    </header>

    <section class="report-section">
      <h2>Executive Summary</h2>
      <div id="reportNarrative" class="report-card"></div>
      <ul id="reportRecs" class="report-list"></ul>
    </section>

    <section class="report-section">
      <h2>Key Metrics</h2>
      <div id="reportKpis" class="kpi-grid"></div>
    </section>

    <section class="report-section">
      <h2>Chart Appendix</h2>
      <div id="reportCharts" class="chart-grid"></div>
    </section>

    <section class="report-section">
      <h2>Highlights & Lowlights</h2>
      <div id="reportHighlights" class="cards-grid"></div>
      <div id="reportLowlights" class="cards-grid"></div>
    </section>

    <section class="report-section report-appendix">
      <h2>Detailed Table Appendix</h2>
      <div id="reportTable" class="report-card"></div>
    </section>
  </div>
  <script src="assets/js/shared.js"></script>
  <script src="assets/js/report.js"></script>
</body>
</html>
